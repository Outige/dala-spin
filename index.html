<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dala Spin to Win</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="wheel-heading">
        <div class="brand-bar">
          <span class="brand-mark" aria-hidden="true">D</span>
          <span>Dala Trade Show</span>
        </div>

        <div class="stage">
          <div class="copy">
            <p class="eyebrow">Spin to win</p>
            <h1 id="wheel-heading">Dala Prize Wheel</h1>
            <p class="intro">Tap the button, watch the wheel fly, and reveal the prize for the next visitor.</p>
          </div>

          <div class="wheel-area">
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="wheel" width="900" height="900" aria-label="Prize wheel"></canvas>
            <div class="wheel-hub" aria-hidden="true"></div>
          </div>

          <div class="controls" aria-live="polite">
            <button id="spin-button" type="button">Spin</button>
            <p id="status" class="status">Ready for the next spin.</p>
          </div>
        </div>
      </section>
    </main>

    <div id="result-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="result-title" hidden>
      <div class="modal-panel">
        <p class="modal-kicker">Winner</p>
        <h2 id="result-title">Prize won</h2>
        <p id="result-message"></p>
        <button id="close-modal" type="button">Next Visitor</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
